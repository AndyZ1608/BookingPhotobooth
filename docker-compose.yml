services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: photobooth
      POSTGRES_PASSWORD: photobooth
      POSTGRES_DB: booking_photobooth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photobooth -d booking_photobooth"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://photobooth:photobooth@db:5432/booking_photobooth?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "3000:3000"
    command: sh -c "pnpm db:deploy && pnpm db:seed && pnpm start"

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: photobooth
      POSTGRES_PASSWORD: photobooth
      POSTGRES_DB: booking_photobooth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photobooth -d booking_photobooth"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    image: bookingphotobooth:${APP_IMAGE_TAG:-local}
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://photobooth:photobooth@db:5432/booking_photobooth?schema=public
      RUN_DB_SEED: ${RUN_DB_SEED:-true}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
